name: Public beta gates
on:
  pull_request:
  push:
    branches: [main, public-beta-hardening]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Real build: syntax-checks every JS file and validates that index.html asset
      # references resolve (see scripts/build.mjs), then runs the behavioral tests.
      - run: npm run build
      - name: Run behavioral tests
        id: behavioral-tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
      - name: Upload behavioral test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-test-output
          path: test-output.txt
          retention-days: 1
      - run: npm audit --omit=dev --audit-level=high
        if: steps.behavioral-tests.outcome == 'success'
      - name: Fail when behavioral tests fail
        if: steps.behavioral-tests.outcome == 'failure'
        run: |
          cat test-output.txt
          exit 1
