name: Public beta gates
on:
  pull_request:
  push:
    branches: [main, public-beta-hardening]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Real build: syntax-checks every JS file and validates that index.html asset
      # references resolve (see scripts/build.mjs), then runs the behavioral tests.
      - run: npm run build
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
